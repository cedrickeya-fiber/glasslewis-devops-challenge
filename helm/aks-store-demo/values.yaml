namespace: store-app

storeFront:
  replicaCount: 1
  image:
    repository: ghcr.io/azure-samples/aks-store-demo/store-front
    tag: "2.1.0"

service:
  type: LoadBalancer
  port: 80

resources:
  requests:
    cpu: 1m
    memory: 200Mi

  limits:
    cpu: 1000m
    memory: 512Mi